.card-hover { transition: box-shadow 0.2s, transform 0.15s; cursor: pointer; }

.label { font-size: 11px; color: var(--label); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }
.grid { display: grid; gap: 8px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }

.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(44,24,16,0.4); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 16px; }

// ─── ATOMS ───────────────────────────────────────────────
const Badge = ({s}) => {const c=SC[s]||SC.not_started;return <span className="badge" style={{color:c.c,background:c.bg}}>{c.l}</span>;};
const Prog = ({p,c,h=6}) => <div className="progress-track" style={{height:h}}><div className="progress-fill" style={{width:`${Math.min(p,100)}%`,background:c||"#6B9B37"}}/></div>;
const Lbl = ({children}) => <div className="label">{children}</div>;

function KPI({label,value,sub,color,alert}) {
  return <div className={`card kpi-card ${alert?"card-alert":""}`}>
    <div className="flex justify-between"><span className="kpi-label">{label}</span>{alert&&<span style={{color:"var(--red)",fontSize:12}}>⚠</span>}</div>
    <div className="kpi-value" style={{color:color||"var(--brown-800)"}}>{value}</div>
    {sub&&<div className="kpi-sub">{sub}</div>}
  </div>;
}

function Inp({label,...p}) {
  return <div style={{marginBottom:12}}><Lbl>{label}</Lbl><input className="input-field" {...p}/></div>;
}
function Sel({label,options,...p}) {
  return <div style={{marginBottom:12}}><Lbl>{label}</Lbl><select className="input-field" {...p}>{options.map(o=><option key={o} value={o}>{o}</option>)}</select></div>;
}
function Txa({label,...p}) {
  return <div style={{marginBottom:12}}><Lbl>{label}</Lbl><textarea className="input-field" style={{minHeight:60,resize:"vertical"}} {...p}/></div>;
}

function Modal({title,onClose,children}) {
  return <div className="modal-overlay" onClick={onClose}>
    <div className="modal-content" onClick={e=>e.stopPropagation()}>
      <div className="modal-header"><h2 className="modal-title">{title}</h2><button className="modal-close" onClick={onClose}>✕</button></div>
      {children}
    </div>
  </div>;
}

function TabBar({tabs,active,onChange}) {
  return <div className="tabs">{tabs.map(t=><button key={t.id} className={`tab-btn ${active===t.id?"active":""}`} onClick={()=>onChange(t.id)}>{t.label}{t.count!=null&&<span className={`tab-count ${t.alert?"alert":""}`}>{t.count}</span>}</button>)}</div>;
}

// ─── UNIVERSAL ADD MODAL ─────────────────────────────────
function AddModal({title,close,fields,onSave,req=[]}) {
  const init={};fields.forEach(f=>{init[f.k]=f.def||"";});
  const [d,sd]=useState(init);
  const u=(k,v)=>sd(p=>({...p,[k]:v}));
  const valid=req.length===0||req.every(k=>d[k]);
  return <Modal title={title} onClose={close}>
    <div className="grid grid-2" style={{gap:8}}>
      {fields.map(f=>{
        if(f.t==="select") return <Sel key={f.k} label={f.l} options={f.opts||[]} value={d[f.k]} onChange={e=>u(f.k,e.target.value)}/>;
        if(f.t==="textarea") return <div key={f.k} style={{gridColumn:"1/-1"}}><Txa label={f.l} value={d[f.k]} onChange={e=>u(f.k,e.target.value)}/></div>;
        return <Inp key={f.k} label={f.l} type={f.t||"text"} step={f.t==="number"?"any":undefined} placeholder={f.ph||""} value={d[f.k]} onChange={e=>u(f.k,e.target.value)}/>;
      })}
    </div>
    <div className="flex justify-between" style={{marginTop:14,justifyContent:"flex-end",gap:8}}>
      <button className="btn-secondary" onClick={close}>Отмена</button>
      <button className="btn-primary" disabled={!valid} onClick={()=>onSave(d)}>Добавить</button>
    </div>
  </Modal>;
}

// ─── DASHBOARD ───────────────────────────────────────────
function Dashboard({ships,go,onNew}) {
  const [filter,setFilter]=useState("all");
  const [search,setSearch]=useState("");
  const [sort,setSort]=useState("newest");

  const filtered=useMemo(()=>{
    let list=[...ships];
    if(filter==="active") list=list.filter(s=>!["completed","cancelled"].includes(s.status));
    else if(filter==="completed") list=list.filter(s=>s.status==="completed");
    else if(filter==="overdue") list=list.filter(s=>cntOD(s.tasks||[])>0||cntCR(s.risks||[])>0);
    if(search.trim()){const q=search.toLowerCase();list=list.filter(s=>s.name.toLowerCase().includes(q)||s.id.toLowerCase().includes(q));}
    if(sort==="newest") list.sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
    else if(sort==="budget_desc") list.sort((a,b)=>b.budgetPlan-a.budgetPlan);
    else if(sort==="progress") list.sort((a,b)=>calcPct(b.stages||[])-calcPct(a.stages||[]));
    return list;
  },[ships,filter,search,sort]);

  const act=ships.filter(s=>!["completed","cancelled"].includes(s.status));
  const tP=act.reduce((a,s)=>a+(s.expenses||[]).reduce((x,e)=>x+e.plan,0),0);
  const tF=act.reduce((a,s)=>a+(s.expenses||[]).reduce((x,e)=>x+e.fact,0),0);
  const tO=ships.reduce((a,s)=>a+cntOD(s.tasks||[]),0);
  const tC=ships.reduce((a,s)=>a+cntCR(s.risks||[]),0);

  return <div>
    <div className="flex justify-between items-center wrap gap-3" style={{marginBottom:20}}>
      <div><h1 className="font-display" style={{fontSize:26}}>Dashboard импорта</h1><p className="text-muted" style={{fontSize:13,marginTop:4}}>Операционная картина по поставкам</p></div>
      <button className="btn-primary" onClick={onNew}>+ Новая поставка</button>
    </div>
    <div className="grid grid-auto" style={{marginBottom:16}}>
      <KPI label="Активных" value={act.length} sub={`из ${ships.length}`}/>
      <KPI label="Бюджет план" value={fmt(tP)+" ₸"}/>
      <KPI label="Бюджет факт" value={fmt(tF)+" ₸"} color={tF>tP?"var(--red)":"var(--green)"}/>
      <KPI label="Просрочки" value={tO} alert={tO>0}/>
      <KPI label="Крит. риски" value={tC} alert={tC>0}/>
    </div>

    {/* Filters */}
    <div className="flex gap-2 wrap items-center" style={{marginBottom:14}}>
      <div style={{flex:"1 1 200px",position:"relative"}}>
        <input className="input-field" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Поиск..." style={{paddingLeft:32}}/>
        <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"var(--muted)",fontSize:14}}>🔍</span>
      </div>
      {[{v:"all",l:"Все"},{v:"active",l:"Активные"},{v:"completed",l:"Завершённые"},{v:"overdue",l:"⚠ Проблемные"}].map(f=>
        <button key={f.v} onClick={()=>setFilter(f.v)} style={{padding:"7px 14px",borderRadius:8,fontSize:12,fontWeight:filter===f.v?700:400,color:filter===f.v?"var(--brown-500)":"var(--muted)",background:filter===f.v?"#FEF6E0":"transparent",border:`1px solid ${filter===f.v?"var(--amber-400)":"var(--input-border)"}`,cursor:"pointer",whiteSpace:"nowrap"}}>{f.l}</button>
      )}
      <select className="input-field" value={sort} onChange={e=>setSort(e.target.value)} style={{width:"auto",padding:"7px 10px",fontSize:12}}>
        <option value="newest">Новые ↓</option><option value="budget_desc">Бюджет ↓</option><option value="progress">Прогресс ↓</option>
      </select>
    </div>

    <div className="flex justify-between items-center" style={{marginBottom:10}}>
      <h3 className="font-display" style={{fontSize:18,fontWeight:400}}>Журнал поставок</h3>
      <span style={{fontSize:11,color:"var(--muted)"}}>{filtered.length} из {ships.length}</span>
    </div>

    <div className="flex flex-col gap-2">
      {filtered.map(s=>{const p=calcPct(s.stages||[]);const o=cntOD(s.tasks||[]);const c=cntCR(s.risks||[]);
      return <div key={s.id} className={`card card-hover ${o>0||c>0?"card-alert":""}`} onClick={()=>go(s.id)}>
        <div className="flex justify-between items-center wrap gap-2" style={{marginBottom:7}}>
          <div><div style={{fontSize:11,color:"var(--muted)"}}>{s.id} · {s.createdAt}</div><div className="font-display" style={{fontSize:15,marginTop:2}}>{s.name}</div></div>
          <Badge s={s.status}/>
        </div>
        <div className="flex items-center gap-3" style={{marginBottom:7}}><div style={{flex:1}}><Prog p={p} c={s.status==="completed"?"#6B9B37":"#D4A843"} h={7}/></div><span style={{fontSize:13,fontWeight:600,color:"var(--brown-500)"}}>{p}%</span></div>
        <div className="flex gap-3 wrap" style={{fontSize:12,color:"var(--label)"}}><span>{(s.items||[]).length} SKU</span><span>Бюджет: {fmt(s.budgetPlan||(s.expenses||[]).reduce((a,e)=>a+e.plan,0))} ₸</span><span>{s.responsible}</span></div>
        {(o>0||c>0)&&<div className="flex gap-2 wrap" style={{marginTop:7}}>
          {o>0&&<span style={{fontSize:10,color:"var(--red)",background:"#FBEAE9",padding:"2px 7px",borderRadius:7,fontWeight:600}}>⏱ {o}</span>}
          {c>0&&<span style={{fontSize:10,color:"#8B2E2E",background:"#F5E0E0",padding:"2px 7px",borderRadius:7,fontWeight:600}}>⚠ {c}</span>}
        </div>}
      </div>;})}
    </div>
  </div>;
}

// ─── SHIPMENT DETAIL (compact — core tabs) ───────────────
function ShipDetail({s,back,upd,log,setModal,del,allShips}) {
  const [tab,setTab]=useState("overview");
  const p=calcPct(s.stages||[]);
  const tP=(s.expenses||[]).reduce((a,e)=>a+e.plan,0);
  const tF=(s.expenses||[]).reduce((a,e)=>a+e.fact,0);
  const tU=(s.items||[]).reduce((a,i)=>a+(i.qty||0),0);

  const tabs=[{id:"overview",label:"Обзор"},{id:"stages",label:"Этапы",count:(s.stages||[]).length},{id:"items",label:"SKU",count:(s.items||[]).length},{id:"expenses",label:"Расходы"},{id:"tasks",label:"Задачи",count:(s.tasks||[]).length,alert:cntOD(s.tasks||[])>0}];
  if(FLAGS.risks) tabs.push({id:"risks",label:"Риски",count:(s.risks||[]).length,alert:cntCR(s.risks||[])>0});
  if(FLAGS.documents) tabs.push({id:"docs",label:"Документы"});
  if(FLAGS.scenarios) tabs.push({id:"scenarios",label:"Сценарии"});
  if(FLAGS.warehouse_detail) tabs.push({id:"warehouse",label:"Склад"});
  tabs.push({id:"launch",label:"Запуск"});
  if(FLAGS.sales) tabs.push({id:"channels",label:"Каналы"});
  if(FLAGS.sales) tabs.push({id:"analytics",label:"Аналитика"});
  if(FLAGS.audit_log) tabs.push({id:"audit",label:"История"});

  const togStage=sid=>{upd(s.id,sh=>{const st=sh.stages.find(x=>x.id===sid);if(!st)return sh;if(st.status==="not_started"){st.status="in_progress";st.pct=10;}else if(st.status==="in_progress"){if(st.substages.some(x=>x.mandatory&&!x.completed))return sh;st.status="completed";st.pct=100;}else{st.status="in_progress";st.pct=80;}return sh;});log(s.id,"Этап обновлён");};
  const togSub=(sid,ssid)=>{upd(s.id,sh=>{const st=sh.stages.find(x=>x.id===sid);if(!st)return sh;const ss=st.substages.find(x=>x.id===ssid);if(!ss)return sh;ss.completed=!ss.completed;const d=st.substages.filter(x=>x.completed).length;st.pct=Math.round(d/st.substages.length*100);if(st.pct===100)st.status="completed";else if(d>0)st.status="in_progress";else st.status="not_started";return sh;});};
  const togTask=tid=>{upd(s.id,sh=>{const t=sh.tasks.find(x=>x.id===tid);if(t)t.status=t.status==="completed"?"pending":"completed";return sh;});log(s.id,"Задача обновлена");};

  return <div>
    <div className="flex items-center gap-2" style={{cursor:"pointer",marginBottom:5}} onClick={back}><span style={{color:"var(--brown-500)"}}>←</span><span style={{fontSize:13,color:"var(--brown-500)"}}>Назад</span></div>
    <div className="flex justify-between items-center wrap gap-2" style={{marginBottom:16}}>
      <div><div style={{fontSize:11,color:"var(--muted)"}}>{s.id}</div><h1 className="font-display" style={{fontSize:21,marginTop:3}}>{s.name}</h1><div style={{fontSize:12,color:"var(--label)",marginTop:3}}>{s.factory} · {s.supplier}</div></div>
      <div className="flex items-center gap-2">
        <button className="btn-secondary" style={{padding:"6px 12px",fontSize:11}} onClick={()=>{const blob=new Blob([JSON.stringify(s,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${s.id}.json`;a.click();}}>📥 Экспорт</button>
        <Badge s={s.status}/>
      </div>
    </div>

    <div className="grid grid-auto" style={{marginBottom:16}}>
      <KPI label="Готовность" value={p+"%"} color="var(--amber-400)"/>
      <KPI label="План" value={fmt(tP)+" ₸"}/>
      <KPI label="Факт" value={fmt(tF)+" ₸"} color={tF>tP?"var(--red)":"var(--green)"}/>
      <KPI label="EUR/KZT" value={s.exchangeRate||"—"} sub="закуп"/>
      <KPI label="SKU" value={(s.items||[]).length} sub={ff(tU)+" ед."}/>
    </div>

    <TabBar tabs={tabs} active={tab} onChange={setTab}/>

    <div className="card">
      {/* OVERVIEW */}
      {tab==="overview"&&<div>
        <h3 className="font-display" style={{fontSize:18,marginBottom:14}}>Общая информация</h3>
        <div className="grid grid-auto" style={{fontSize:13,gap:10}}>
          {[["Создано",s.createdAt],["План. закуп",s.plannedPurchase||"—"],["План. отгрузка",s.plannedShipment||"—"],["План. прибытие",s.plannedArrival||"—"],["Факт. прибытие",s.actualArrival||"—"],["Ответственный",s.responsible||"—"],["Транспорт",s.transportType||"—"],["Incoterms",s.incoterms||"—"]].map(([l,v],i)=><div key={i}><Lbl>{l}</Lbl><div style={{fontWeight:500}}>{v}</div></div>)}
        </div>
        <h3 className="font-display" style={{fontSize:18,margin:"18px 0 12px"}}>Маршрутная карта</h3>
        {(s.stages||[]).map((st,i)=><div key={st.id} className="flex items-center gap-2" style={{marginBottom:2}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:SGC[st.status]||"#D9D3C7",flexShrink:0}}/>
          <span style={{flex:1,fontSize:12,color:st.status==="completed"?"var(--green)":st.status==="in_progress"?"var(--brown-800)":"var(--muted)"}}>{st.name}</span>
          <div style={{width:45}}><Prog p={st.pct} c={SGC[st.status]} h={4}/></div>
          <span style={{fontSize:10,color:"var(--muted)",width:26,textAlign:"right"}}>{st.pct}%</span>
        </div>)}
      </div>}

      {/* STAGES */}
      {tab==="stages"&&<div>
        <h3 className="font-display" style={{fontSize:18,marginBottom:14}}>Маршрутная карта</h3>
        {(s.stages||[]).map((st,i)=><div key={st.id} style={{marginBottom:10,border:`1px solid ${st.status==="completed"?"#D4E8BF":st.status==="in_progress"?"#C5DDF0":"var(--border)"}`,borderRadius:10,overflow:"hidden"}}>
          <div className="flex items-center gap-3" style={{padding:"9px 12px",background:st.status==="completed"?"#F6FAF0":st.status==="in_progress"?"#F5FAFF":"#FEFCF6",cursor:"pointer"}} onClick={()=>togStage(st.id)}>
            <div style={{width:24,height:24,borderRadius:"50%",background:SGC[st.status],display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:700,flexShrink:0}}>{st.status==="completed"?"✓":i+1}</div>
            <div style={{flex:1,fontSize:13,fontWeight:500}}>{st.name}</div>
            <div style={{width:60}}><Prog p={st.pct} c={SGC[st.status]} h={5}/></div>
            <span style={{fontSize:12,fontWeight:600,color:SGC[st.status],width:34,textAlign:"right"}}>{st.pct}%</span>
          </div>
          {st.status!=="not_started"&&<div style={{padding:"5px 12px 8px",background:"#FEFCF6"}}>{st.substages.map(ss=><div key={ss.id} className="flex items-center gap-2" style={{padding:"3px 0",cursor:"pointer"}} onClick={()=>togSub(st.id,ss.id)}>
            <div style={{width:15,height:15,borderRadius:3,border:`2px solid ${ss.completed?"var(--green)":ss.mandatory?"var(--amber-400)":"#D9D3C7"}`,background:ss.completed?"var(--green)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{ss.completed&&<span style={{color:"#fff",fontSize:9}}>✓</span>}</div>
            <span style={{fontSize:12,color:ss.completed?"var(--green)":"var(--brown-800)",textDecoration:ss.completed?"line-through":"none"}}>{ss.name}</span>
            {ss.mandatory&&!ss.completed&&<span style={{fontSize:9,color:"var(--orange)",background:"#FEF3E8",padding:"1px 5px",borderRadius:5}}>обяз.</span>}
          </div>)}</div>}
        </div>)}
      </div>}

      {/* SKU */}
      {tab==="items"&&<div>
        <div className="flex justify-between items-center" style={{marginBottom:12}}><h3 className="font-display" style={{fontSize:18}}>SKU</h3><button className="btn-primary" onClick={()=>setModal(`item:${s.id}`)}>+ SKU</button></div>
        {!(s.items||[]).length?<div className="text-center text-muted" style={{padding:24}}>Нет SKU</div>:
        <div style={{overflowX:"auto"}}><table className="data-table"><thead><tr>{["SKU","Название","Кат.","Кол-во","€","₸","Маржа",""].map(h=><th key={h} style={{textAlign:["Кол-во","€","₸","Маржа"].includes(h)?"right":"left"}}>{h}</th>)}</tr></thead>
        <tbody>{(s.items||[]).map(it=><tr key={it.id}><td style={{color:"var(--brown-500)",fontWeight:600}}>{it.sku}</td><td>{it.name}</td><td className="text-muted">{it.category||"—"}</td><td className="text-right">{ff(it.qty)}</td><td className="text-right">€{it.priceEur?.toFixed(2)}</td><td className="text-right">{it.plannedPrice?ff(it.plannedPrice):"-"}</td><td className="text-right"><span style={{color:it.margin>=40?"var(--green)":it.margin>=30?"var(--amber-400)":"var(--red)",fontWeight:600}}>{it.margin}%</span></td><td><button className="btn-icon" onClick={e=>{e.stopPropagation();del(s.id,"items",it.id);}}>✕</button></td></tr>)}</tbody></table></div>}
      </div>}

      {/* EXPENSES */}
      {tab==="expenses"&&<div>
        <div className="flex justify-between items-center" style={{marginBottom:12}}><h3 className="font-display" style={{fontSize:18}}>Расходы</h3><button className="btn-primary" onClick={()=>setModal(`exp:${s.id}`)}>+ Расход</button></div>
        {!(s.expenses||[]).length?<div className="text-center text-muted" style={{padding:24}}>Нет</div>:
        <div style={{overflowX:"auto"}}><table className="data-table"><thead><tr>{["Категория","Вал.","План","Факт","Δ",""].map(h=><th key={h} style={{textAlign:["План","Факт","Δ"].includes(h)?"right":"left"}}>{h}</th>)}</tr></thead>
        <tbody>{(s.expenses||[]).map(e=>{const d2=e.fact-e.plan;return<tr key={e.id}><td>{e.category}</td><td className="text-muted">{e.currency}</td><td className="text-right">{ff(e.plan)}</td><td className="text-right">{e.fact>0?ff(e.fact):"—"}</td><td className="text-right" style={{color:d2>0&&e.fact>0?"var(--red)":"var(--green)",fontWeight:600}}>{e.fact>0?(d2>0?"+":"")+ff(d2):"—"}</td><td><button className="btn-icon" onClick={()=>del(s.id,"expenses",e.id)}>✕</button></td></tr>;})}</tbody>
        <tfoot><tr><td>Итого</td><td/><td className="text-right">{ff(tP)}</td><td className="text-right">{tF>0?ff(tF):"—"}</td><td className="text-right" style={{color:tF-tP>0?"var(--red)":"var(--green)"}}>{tF>0?ff(tF-tP):"—"}</td><td/></tr></tfoot></table></div>}
      </div>}

      {/* TASKS */}
      {tab==="tasks"&&<div>
        <div className="flex justify-between items-center" style={{marginBottom:12}}><h3 className="font-display" style={{fontSize:18}}>Задачи</h3><button className="btn-primary" onClick={()=>setModal(`task:${s.id}`)}>+ Задача</button></div>
        <div className="flex flex-col gap-2">{(s.tasks||[]).map(t=><div key={t.id} className="flex items-center gap-2" style={{padding:"7px 9px",background:t.status==="overdue"?"#FDF0EE":"#FEFCF6",borderRadius:7,border:`1px solid ${t.status==="overdue"?"#E8C5C1":"var(--border)"}`}}>
          <div onClick={()=>togTask(t.id)} style={{width:16,height:16,borderRadius:3,border:`2px solid ${t.status==="completed"?"var(--green)":t.status==="overdue"?"var(--red)":"var(--amber-400)"}`,background:t.status==="completed"?"var(--green)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>{t.status==="completed"&&<span style={{color:"#fff",fontSize:9}}>✓</span>}</div>
          <div style={{flex:1}}><div style={{fontSize:12,textDecoration:t.status==="completed"?"line-through":"none"}}>{t.name}</div><div style={{fontSize:11,color:"var(--muted)"}}>{t.responsible} · {t.deadline}</div></div>
          {t.status==="overdue"&&<span style={{fontSize:10,color:"var(--red)",background:"#FBEAE9",padding:"2px 7px",borderRadius:7,fontWeight:600}}>!</span>}
          <button className="btn-icon" onClick={()=>del(s.id,"tasks",t.id)}>✕</button>
        </div>)}</div>
      </div>}

      {/* RISKS */}
      {tab==="risks"&&<div>
        <div className="flex justify-between items-center" style={{marginBottom:12}}><h3 className="font-display" style={{fontSize:18}}>Риски</h3><button className="btn-primary" onClick={()=>setModal(`risk:${s.id}`)}>+ Риск</button></div>
        <div className="flex flex-col gap-2">{(s.risks||[]).map(r=><div key={r.id} className="flex items-center gap-2" style={{padding:"9px 11px",background:r.level==="critical"?"#FDF0EE":"#FEFCF6",borderRadius:7,border:`1px solid ${r.level==="critical"?"#E8C5C1":"var(--border)"}`}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:RC[r.level],flexShrink:0}}/>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{r.name}</div><div style={{fontSize:11,color:"var(--muted)"}}>{r.category}</div></div>
          <div className="text-right"><div style={{fontSize:10,color:RC[r.level],fontWeight:600}}>{r.level}</div>{r.financialImpact>0&&<div style={{fontSize:11,color:"var(--label)"}}>{ff(r.financialImpact)} ₸</div>}</div>
          <button className="btn-icon" onClick={()=>del(s.id,"risks",r.id)}>✕</button>
        </div>)}</div>
      </div>}

      {/* DOCUMENTS */}
      {tab==="docs"&&<div>
        <div className="flex justify-between items-center" style={{marginBottom:12}}><h3 className="font-display" style={{fontSize:18}}>Документы</h3><button className="btn-primary" onClick={()=>setModal(`doc:${s.id}`)}>+ Документ</button></div>
        {(()=>{const docs=s.documents||[];const miss=docs.filter(d=>d.mandatory&&d.status==="pending");
        return<>{miss.length>0&&<div style={{padding:10,background:"#FBEAE9",borderRadius:8,marginBottom:12,fontSize:12,color:"var(--red)"}}>⚠ Обязательные документы: {miss.length} не загружены</div>}
        <div style={{overflowX:"auto"}}><table className="data-table"><thead><tr>{["Тип","Название","Статус","Вер.",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{docs.map(d=><tr key={d.id}><td style={{fontWeight:600,color:"var(--brown-500)"}}>{d.type}</td><td>{d.name}</td><td><Badge s={d.status}/></td><td>{d.version||"—"}</td><td><button className="btn-icon" onClick={()=>del(s.id,"documents",d.id)}>✕</button></td></tr>)}</tbody></table></div></>;})()}
      </div>}

      {/* SCENARIOS */}
      {tab==="scenarios"&&<div>
        <h3 className="font-display" style={{fontSize:18,marginBottom:14}}>Сценарный анализ</h3>
        {(()=>{const sc=s.scenarios||{};const labels={base:"Базовый",optimistic:"Оптимистичный",stress:"Стрессовый"};const colors={base:"var(--amber-400)",optimistic:"var(--green)",stress:"var(--red)"};
        const params=["exchangeRate","deliveryDays","logisticsCost","customsCost","defectRate","salesPace","salePrice","discount"];
        const pLabels={exchangeRate:"Курс",deliveryDays:"Дни",logisticsCost:"Логистика",customsCost:"Таможня",defectRate:"Брак",salesPace:"Темп",salePrice:"Цена",discount:"Скидка"};
        const fmtV=(k,v)=>{if(!v)return"—";if(k.includes("Cost"))return ff(v);if(k.includes("Rate")&&v<1)return(v*100).toFixed(0)+"%";return String(v);};
        const calcP=sc2=>{const tp=(s.items||[]).reduce((a,it)=>a+it.qty*it.priceEur*(sc2.exchangeRate||530),0);const tc=tp+(sc2.logisticsCost||0)+(sc2.customsCost||0);const tr=(s.items||[]).reduce((a,it)=>a+it.qty*(sc2.salePrice||it.plannedPrice||0),0)*(1-(sc2.discount||0)/100)*(sc2.salesPace||1);return tr-tr*((sc2.returnRate||0)+(sc2.defectRate||0))-tc;};
        return<div style={{overflowX:"auto"}}><table className="data-table"><thead><tr><th>Параметр</th>{Object.keys(labels).map(k=><th key={k} className="text-right" style={{color:colors[k],fontWeight:700}}>{labels[k]}</th>)}</tr></thead>
        <tbody>{params.map(pk=><tr key={pk}><td>{pLabels[pk]}</td>{Object.keys(labels).map(sk=><td key={sk} className="text-right">{fmtV(pk,sc[sk]?.[pk])}</td>)}</tr>)}</tbody>
        <tfoot><tr><td style={{fontWeight:700}}>Прогноз прибыли</td>{Object.keys(labels).map(sk=>{const pr=calcP(sc[sk]||{});return<td key={sk} className="text-right" style={{fontWeight:700,color:pr>=0?"var(--green)":"var(--red)"}}>{pr>=0?"+":""}{fmt(Math.round(pr))} ₸</td>;})}</tr></tfoot></table></div>;})()}
      </div>}

      {/* WAREHOUSE */}
      {tab==="warehouse"&&<div>
        <h3 className="font-display" style={{fontSize:18,marginBottom:14}}>Склад</h3>
        {(()=>{const wh=s.warehouse||{};
        return<div>
          <div className="grid grid-auto" style={{marginBottom:14}}>
            <KPI label="Склад" value={wh.name||"Не назначен"}/>
            <KPI label="Ожидается" value={ff(wh.expectedUnits||tU)+" ед."}/>
            <KPI label="Статус" value={wh.isConfirmed?"Подтверждено":"Ожидает"} color={wh.isConfirmed?"var(--green)":"var(--amber-400)"}/>
          </div>
          {!wh.isConfirmed?<div style={{padding:14,border:"1px dashed var(--amber-400)",borderRadius:10,background:"#FEF6E0"}}>
            <div style={{fontSize:14,fontWeight:600,marginBottom:10}}>Подтверждение приёмки</div>
            <div className="grid grid-3"><Inp label="Дата прибытия" type="date" value={wh.arrivalDate||""} onChange={e=>upd(s.id,sh=>({...sh,warehouse:{...sh.warehouse,arrivalDate:e.target.value}}))}/><Inp label="Факт. единиц" type="number" value={wh.actualUnits||""} onChange={e=>upd(s.id,sh=>({...sh,warehouse:{...sh.warehouse,actualUnits:+e.target.value}}))}/><Inp label="Повреждений" type="number" value={wh.damagedUnits||""} onChange={e=>upd(s.id,sh=>({...sh,warehouse:{...sh.warehouse,damagedUnits:+e.target.value}}))}/></div>
            <button className="btn-primary" onClick={()=>{upd(s.id,sh=>{const w={...sh.warehouse,isConfirmed:true};w.stock=(sh.items||[]).map(it=>({sku:it.sku,name:it.name,available:it.qty,sold:0}));return{...sh,warehouse:w,actualArrival:w.arrivalDate};});log(s.id,"Приёмка подтверждена");}}>Подтвердить</button>
          </div>:
          <div><div style={{color:"var(--green)",fontWeight:600,marginBottom:10}}>✓ Приёмка подтверждена</div>
            {(wh.stock||[]).length>0&&<table className="data-table"><thead><tr><th>SKU</th><th>Название</th><th className="text-right">Доступно</th><th className="text-right">Продано</th></tr></thead>
            <tbody>{wh.stock.map((st,i)=><tr key={i}><td style={{fontWeight:600,color:"var(--brown-500)"}}>{st.sku}</td><td>{st.name}</td><td className="text-right text-success font-bold">{ff(st.available)}</td><td className="text-right">{ff(st.sold)}</td></tr>)}</tbody></table>}
          </div>}
        </div>;})()}
      </div>}

      {/* LAUNCH */}
      {tab==="launch"&&<div>
        <h3 className="font-display" style={{fontSize:18,marginBottom:14}}>Запуск продаж</h3>
        {(()=>{const ln=s.launch||{};const isOk=(s.warehouse||{}).isConfirmed;
        return<div>
          {!isOk&&<div style={{padding:12,background:"#FBEAE9",borderRadius:8,fontSize:13,color:"var(--red)",marginBottom:14}}>⚠ Склад не подтверждён</div>}
          {[{k:"stockDistributed",l:"Товар распределён"},{k:"pricesSet",l:"Цены установлены"},{k:"channelsAssigned",l:"Каналы назначены"}].map(it=>
            <div key={it.k} className="flex items-center gap-2" style={{padding:"8px 10px",background:ln[it.k]?"#F6FAF0":"#FEFCF6",borderRadius:7,border:`1px solid ${ln[it.k]?"#D4E8BF":"var(--border)"}`,marginBottom:6,cursor:"pointer"}} onClick={()=>{upd(s.id,sh=>({...sh,launch:{...sh.launch,[it.k]:!sh.launch[it.k]}}));log(s.id,`Запуск: ${it.l}`);}}>
              <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${ln[it.k]?"var(--green)":"var(--amber-400)"}`,background:ln[it.k]?"var(--green)":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{ln[it.k]&&<span style={{color:"#fff",fontSize:10}}>✓</span>}</div>
              <span style={{fontSize:13}}>{it.l}</span>
            </div>
          )}
          {isOk&&ln.stockDistributed&&ln.pricesSet&&ln.channelsAssigned&&ln.status!=="launched"&&<button className="btn-primary" style={{marginTop:12}} onClick={()=>{upd(s.id,sh=>({...sh,launch:{...sh.launch,status:"launched"},status:"selling"}));log(s.id,"Продажи запущены");}}>🚀 Запустить</button>}
          {ln.status==="launched"&&<div style={{marginTop:12,padding:12,background:"#F0F7E6",borderRadius:8,color:"var(--green)",fontWeight:600}}>✓ Продажи запущены</div>}
        </div>;})()}
      </div>}

      {/* CHANNELS */}
      {tab==="channels"&&<div>
        <div className="flex justify-between items-center" style={{marginBottom:12}}><h3 className="font-display" style={{fontSize:18}}>Каналы сбыта</h3><button className="btn-primary" onClick={()=>setModal(`channel:${s.id}`)}>+ Канал</button></div>
        <div className="flex flex-col gap-2">{(s.channels||[]).map(c=><div key={c.id} className="flex items-center gap-3" style={{padding:"10px 12px",background:"#FEFCF6",borderRadius:8,border:"1px solid var(--border)"}}>
          <div style={{width:24,height:24,borderRadius:6,background:"var(--amber-400)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:700}}>{c.priority}</div>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{c.name}</div><div style={{fontSize:11,color:"var(--muted)"}}>{c.type} · {c.geography} · {c.commission}%</div></div>
          <div className="text-right"><div style={{fontSize:12,fontWeight:600}}>{c.salesFact>0?ff(c.salesFact)+" ₸":"—"}</div><div style={{fontSize:10,color:"var(--muted)"}}>из {ff(c.salesPlan)} ₸</div></div>
          <button className="btn-icon" onClick={()=>del(s.id,"channels",c.id)}>✕</button>
        </div>)}</div>
      </div>}

      {/* ANALYTICS */}
      {tab==="analytics"&&<div>
        <h3 className="font-display" style={{fontSize:18,marginBottom:14}}>Аналитика</h3>
        {(()=>{const expenses=s.expenses||[];const items=s.items||[];
        const expData=expenses.filter(e=>e.plan>0).map(e=>({name:e.category.length>12?e.category.slice(0,12)+"…":e.category,"План":e.plan,"Факт":e.fact}));
        const skuData=items.map(it=>({name:it.sku,"Маржа":it.margin}));
        const pieData=[
          {name:"Завершено",value:(s.stages||[]).filter(x=>x.status==="completed").length,color:"#6B9B37"},
          {name:"В работе",value:(s.stages||[]).filter(x=>x.status==="in_progress").length,color:"#5B8FB9"},
          {name:"Не начато",value:(s.stages||[]).filter(x=>x.status==="not_started").length,color:"#D9D3C7"},
        ].filter(d=>d.value>0);
        return<div>
          {expData.length>0&&<div style={{marginBottom:24}}><div style={{fontSize:14,fontWeight:600,marginBottom:8}}>Расходы: план vs факт</div>
            <div style={{height:200,width:"100%"}}><ResponsiveContainer><BarChart data={expData}><CartesianGrid strokeDasharray="3 3" stroke="#F0E8D8"/><XAxis dataKey="name" tick={{fontSize:9}}/><YAxis tick={{fontSize:10}} tickFormatter={v=>fmt(v)}/><Tooltip formatter={v=>ff(v)+" ₸"}/><Legend wrapperStyle={{fontSize:11}}/><RBar dataKey="План" fill="#D4A843" radius={[4,4,0,0]}/><RBar dataKey="Факт" fill="#6B9B37" radius={[4,4,0,0]}/></BarChart></ResponsiveContainer></div>
          </div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            {pieData.length>0&&<div><div style={{fontSize:14,fontWeight:600,marginBottom:8}}>Прогресс этапов</div><div style={{height:170}}><ResponsiveContainer><PieChart><Pie data={pieData} cx="50%" cy="50%" innerRadius={35} outerRadius={65} dataKey="value">{pieData.map((e,i)=><Cell key={i} fill={e.color}/>)}</Pie><Tooltip/><Legend wrapperStyle={{fontSize:10}}/></PieChart></ResponsiveContainer></div></div>}
            {skuData.length>0&&<div><div style={{fontSize:14,fontWeight:600,marginBottom:8}}>Маржа по SKU</div><div style={{height:170}}><ResponsiveContainer><BarChart data={skuData}><CartesianGrid strokeDasharray="3 3" stroke="#F0E8D8"/><XAxis dataKey="name" tick={{fontSize:9}}/><YAxis tick={{fontSize:10}}/><Tooltip/><RBar dataKey="Маржа" radius={[4,4,0,0]}>{skuData.map((e,i)=><Cell key={i} fill={e["Маржа"]>=40?"#6B9B37":e["Маржа"]>=30?"#D4A843":"#B94A3F"}/>)}</RBar></BarChart></ResponsiveContainer></div></div>}
          </div>
        </div>;})()}
      </div>}

      {/* AUDIT */}
      {tab==="audit"&&<div>
        <h3 className="font-display" style={{fontSize:18,marginBottom:14}}>История</h3>
        <div className="flex flex-col" style={{gap:3}}>{(s.audit||[]).map((l,i)=><div key={i} className="flex gap-2" style={{padding:"6px 9px",background:i%2===0?"#FEFCF6":"#FFFDF7",borderRadius:5,fontSize:12}}>
          <span className="text-muted" style={{minWidth:95,whiteSpace:"nowrap"}}>{l.date}</span>
          <span style={{color:"var(--brown-500)",fontWeight:600,minWidth:60}}>{l.user}</span>
          <span>{l.action}</span>
        </div>)}</div>
      </div>}
    </div>
  </div>;
}

// ─── SETTINGS PAGE ───────────────────────────────────────
function Settings({back}) {
  return <div>
    <div className="flex items-center gap-2" style={{cursor:"pointer",marginBottom:8}} onClick={back}><span style={{color:"var(--brown-500)"}}>←</span><span style={{fontSize:13,color:"var(--brown-500)"}}>Назад</span></div>
    <h1 className="font-display" style={{fontSize:26,marginBottom:20}}>Настройки</h1>

    <div className="card" style={{marginBottom:16,padding:"14px 16px",background:"#F6FAF0",border:"1px solid #D4E8BF"}}>
      <div className="flex justify-between items-center wrap gap-2">
        <div><div style={{fontSize:13,fontWeight:600}}>💾 Данные сохраняются в браузере (localStorage)</div><div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>Все изменения автоматически сохраняются и восстанавливаются при перезагрузке.</div></div>
        <button className="btn-danger" onClick={()=>{if(confirm("Сбросить все данные к исходным?")){localStorage.removeItem("ic_ships");location.reload();}}}>🗑 Сбросить данные</button>
      </div>
    </div>

    <div className="card" style={{marginBottom:16}}>
      <h3 className="font-display" style={{fontSize:18,marginBottom:14}}>Модули платформы</h3>
      <div className="grid" style={{gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:8}}>
        {Object.entries(FLAGS).map(([k,v])=><div key={k} className="flex items-center gap-2" style={{padding:"8px 10px",background:v?"#F6FAF0":"#FEFCF6",borderRadius:8,border:`1px solid ${v?"#D4E8BF":"var(--border)"}`}}>
          <input type="checkbox" checked={v} readOnly style={{width:16,height:16,accentColor:"var(--amber-400)"}}/>
          <span style={{fontSize:13}}>{k}</span>
        </div>)}
      </div>
    </div>
    <div className="card">
      <h3 className="font-display" style={{fontSize:18,marginBottom:14}}>Формулы расчёта</h3>
      {[["Себестоимость SKU","закуп × курс + логист. + тамож. + склад + проч."],["Валовая прибыль","выручка − себестоимость"],["Чистая прибыль","валовая − возвраты − списания"],["Break-even","себестоимость × 1.05"],["Sell-through","продано / (остаток + продано)"]].map(([n,f],i)=>
        <div key={i} className="flex gap-2" style={{padding:"6px 9px",background:i%2===0?"#FEFCF6":"#FFFDF7",borderRadius:5,fontSize:12,marginBottom:2}}>
          <span style={{color:"var(--brown-500)",fontWeight:600,minWidth:140}}>{n}</span>
          <span style={{fontFamily:"monospace",fontSize:11}}>{f}</span>
        </div>
      )}
    </div>
  </div>;
}

// ─── RENDER ──────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
